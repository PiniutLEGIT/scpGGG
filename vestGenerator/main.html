<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Vest Generator</title>

<style>
:root {
  --bg:#0f1115;
  --panel:#151922;
  --text:#e6e6e6;
  --accent:#4aa3ff;
  --border:#2a3140;
}
body.light {
  --bg:#fff;
  --panel:#f4f4f4;
  --text:#000;
  --accent:#0066cc;
  --border:#ccc;
}
body { background:var(--bg); color:var(--text); font-family:Arial; padding:20px; }
.section { background:var(--panel); border:1px solid var(--border); padding:10px; margin-bottom:10px; }
input, select {
  background:var(--panel);
  color:var(--text);
  border:1px solid var(--border);
  padding:5px;
  margin:2px;
}
button { background:var(--accent); border:none; color:white; padding:6px 10px; cursor:pointer; }
.row { margin-bottom:6px; }
#output { white-space:pre-wrap; background:#000; padding:10px; }
</style>
</head>

<body>

<p>
	<a href="https://github.com/PiniutLEGIT/scpGGG">Menu główne</a>
	 | 
	<a href="https://piniutlegit.github.io/scpGGG/chipUpgrade/main.html">Ulepszanie czipów</a>
   | 
  <a href="https://piniutlegit.github.io/scpGGG/classAddition/main.html">Generator klas</a>
</p>
<h2>Vest Generator</h2>
<button onclick="toggleTheme()">Toggle Light/Dark</button>

<div class="section">
<div class="row">Name: <input id="name"></div>
<div class="row">Model: <input id="model"></div>
<div class="row">Durability: <input id="durability" placeholder="default: 225"></div>
<div class="row">Mobility: <input id="mobility" placeholder="0.2 - 1.9"></div>
<div class="row">Weight: <input id="weight" placeholder="0 - 10"></div>

<div class="row">
<label>Random Vest <input type="checkbox" id="randomvest"></label>
</div>

<div class="row">
Callback: <input id="callback" placeholder="optional">
</div>
</div>

<div class="section">
<b>Damage</b>
<div id="damageList"></div>
<button onclick="addDamage()">+ Add Damage</button>
</div>

<div class="section">
<label>
<input type="checkbox" id="bodygroupsToggle"> Bodygroups
</label>
<div id="bodygroupsSection" style="display:none;">
Key: <input id="bgKey">
Value: <input id="bgValue">
</div>
</div>

<div class="section">
<button onclick="generate()">Generate</button>
</div>

<div class="section">
<pre id="output"></pre>
</div>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}

// toggle bodygroups
document.getElementById("bodygroupsToggle").onchange = e=>{
  document.getElementById("bodygroupsSection").style.display =
    e.target.checked ? "block" : "none";
};

// load damage presets
let damagePresets = [];

fetch("damage.txt")
.then(r => r.text())
.then(text => {
  damagePresets = text.split(/\r?\n/).map(x=>x.trim()).filter(x=>x);
})
.catch(() => {
  console.warn("damage.txt not found");
});

function addDamage(){
  const div = document.createElement("div");
  div.className = "row";

  const id = Math.random().toString(36).substring(2,7);

  div.innerHTML = `
    Type: <input list="dmgList-${id}" class="dmgType" placeholder="DMG_BULLET">
    <datalist id="dmgList-${id}"></datalist>
    Value: <input class="dmgValue">
  `;

  document.getElementById("damageList").appendChild(div);

  const dataList = div.querySelector("datalist");
  damagePresets.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d;
    dataList.appendChild(opt);
  });
}

function generate(){
  const name = document.getElementById("name").value;
  const model = document.getElementById("model").value;
  const durability = document.getElementById("durability").value;
  const mobility = document.getElementById("mobility").value;
  const weight = document.getElementById("weight").value;
  const randomvest = document.getElementById("randomvest").checked;
  const callback = document.getElementById("callback").value;

  let parts = [];

  if(model) parts.push(`model = ${model}`);

  // damage
  let dmgEntries = [];
  document.querySelectorAll("#damageList .row").forEach(row=>{
    const type = row.querySelector(".dmgType").value;
    const val = row.querySelector(".dmgValue").value;
    if(type && val){
      dmgEntries.push(`[${type}] = ${val}`);
    }
  });

  if(dmgEntries.length > 0){
    parts.push(`damage = { ${dmgEntries.join(", ")} }`);
  }

  if(durability) parts.push(`durability = ${durability}`);
  if(mobility) parts.push(`mobility = ${mobility}`);
  if(weight) parts.push(`weight = ${weight}`);

  // bodygroups
  if(document.getElementById("bodygroupsToggle").checked){
    const key = document.getElementById("bgKey").value;
    const val = document.getElementById("bgValue").value;
    if(key && val){
      parts.push(`bodygroups = { ${key} = ${val} }`);
    }
  }

  let output = `VEST.Register( "${name}", { ${parts.join(", ")} }`;

  if(randomvest) output += `, true`;

  if(callback){
    if(!randomvest) output += `, false`;
    output += `, ${callback}`;
  }

  output += ` )`;

  document.getElementById("output").textContent = output;
}
</script>

</body>
</html>
