<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>Tworzenie klas</title>
		<style>
			:root {
				--bg: #0f1115;
				--panel: #151922;
				--text: #e6e6e6;
				--muted: #9aa3b2;
				--accent: #4aa3ff;
				--input: #0c0f14;
				--border: #2a3140;
			}

			body.light {
				--bg: #ffffff;
				--panel: #f4f4f4;
				--text: #000000;
				--muted: #555;
				--accent: #0066cc;
				--input: #ffffff;
				--border: #ccc;
			}

			body {
				font-family: Arial;
				padding: 20px;
				background: var(--bg);
				color: var(--text);
			}
			input,
			select,
			textarea {
				margin: 4px 0;
				background: var(--input);
				color: var(--text);
				border: 1px solid var(--border);
				padding: 4px;
			}
			button {
				background: var(--accent);
				border: none;
				color: white;
				padding: 6px 10px;
				cursor: pointer;
			}
			pre {
				background: var(--panel);
				padding: 10px;
				border: 1px solid var(--border);
			}
			.section {
				padding: 10px;
				background: var(--panel);
				border: 1px solid var(--border);
				margin-bottom: 10px;
			}
			.error {
				color: #ff6b6b;
			}
		</style>
	</head>
	<body>
		<h2>Class Generator</h2>
		<button onclick="toggleTheme()">Toggle Light/Dark</button><br /><br />

		<div id="errors" class="error"></div>

		<label>Type:</label>
		<select id="classType">
			<option value="normal">RegisterClass</option>
			<option value="support">RegisterSupportClass</option></select
		><br /><br />

		<div class="section">
			<label>Name:</label><input id="name" /><br />

			<label>Group:</label>
			<input id="group" list="group_list" />
			<datalist id="group_list"></datalist><br />

			<label>Model:</label><input id="model" /><br />
		</div>

		<div class="section">
			<h3>Data</h3>

			<label>team:</label>
			<input id="team" list="team_list" />
			<datalist id="team_list"></datalist><br />

			<label>weapons:</label><input id="weapons" placeholder="{}" /><br />
			<label>ammo:</label><input id="ammo" placeholder="{}" /><br />

			<label>chip:</label>
			<input id="chip" list="chip_list" />
			<datalist id="chip_list"></datalist><br />

			<label>omnitool:</label
			><input type="checkbox" id="omnitool" /><br />
			<label>health:</label
			><input type="number" id="health" value="100" /><br />
			<label>walk_speed:</label
			><input type="number" id="walk_speed" value="100" /><br />
			<label>run_speed:</label
			><input type="number" id="run_speed" value="225" /><br />
			<label>sanity:</label
			><input type="number" id="sanity" value="100" /><br />
			<label>vest:</label><input id="vest" placeholder="nil" /><br />
			<label>max:</label><input type="number" id="max" value="0" /><br />
			<label>tier:</label
			><input type="number" id="tier" value="0" /><br />
		</div>

		<label
			><input
				type="checkbox"
				id="optional_master"
				onclick="toggleOptionalSection()"
			/>
			Enable Optional Settings</label
		>

		<div id="optional_section" style="display: none">
			<div class="section">
				<h3>Optional</h3>

				<label
					><input
						type="checkbox"
						id="stamina_toggle"
						onclick="toggle('stamina')"
					/>
					stamina</label
				>
				<input id="stamina" style="display: none" /><br />

				<label
					><input
						type="checkbox"
						id="max_sanity_toggle"
						onclick="toggle('max_sanity')"
					/>
					max_sanity</label
				>
				<input id="max_sanity" style="display: none" /><br />

				<label><input type="checkbox" id="hide_toggle" /> hide</label
				><br />

				<label
					><input
						type="checkbox"
						id="select_group_toggle"
						onclick="toggle('select_group')"
					/>
					select_group</label
				>
				<input id="select_group" style="display: none" /><br />

				<label
					><input
						type="checkbox"
						id="weight_toggle"
						onclick="toggle('weight')"
					/>
					weight</label
				>
				<input id="weight" style="display: none" /><br />

				<label
					><input
						type="checkbox"
						id="persona_toggle"
						onclick="togglePersona()"
					/>
					persona</label
				><br />
				<div
					id="persona_fields"
					style="display: none; margin-left: 15px"
				>
					class: <input id="persona_class" /> team:
					<input id="persona_team" />
				</div>

				<label
					><input
						type="checkbox"
						id="override_toggle"
						onclick="toggle('override_body')"
					/>
					override</label
				><br />
				<textarea
					id="override_body"
					style="display: none; width: 300px; height: 60px"
				></textarea
				><br />

				<label
					><input
						type="checkbox"
						id="spawn_toggle"
						onclick="toggle('spawn')"
					/>
					spawn</label
				>
				<input id="spawn" style="display: none" /><br />

				<label
					><input
						type="checkbox"
						id="select_override_toggle"
						onclick="toggle('select_override_body')"
					/>
					select_override</label
				><br />
				<textarea
					id="select_override_body"
					style="display: none; width: 300px; height: 60px"
				></textarea
				><br />

				<label
					><input
						type="checkbox"
						id="callback_toggle"
						onclick="toggle('callback_body')"
					/>
					callback</label
				><br />
				<textarea
					id="callback_body"
					style="display: none; width: 300px; height: 60px"
				></textarea
				><br />
			</div>
		</div>

		<br />
		<button onclick="generate()">Generate</button>

		<h3>Output</h3>
		<pre id="output"></pre>

		<script>
			function toggleTheme() {
    // Jeśli body ma klasę 'light', usuń ją, w przeciwnym wypadku dodaj
    document.body.classList.toggle('light');
}

function toggleOptionalSection() {
    const optionalSection = document.getElementById('optional_section');
    if (optionalSection.style.display === 'none' || optionalSection.style.display === '') {
        optionalSection.style.display = 'block';
    } else {
        optionalSection.style.display = 'none';
    }
}

function toggle(id) {
    const el = document.getElementById(id);
    if (el.style.display === 'none' || el.style.display === '') {
        el.style.display = 'inline-block';
    } else {
        el.style.display = 'none';
    }
}

function togglePersona() {
    const el = document.getElementById('persona_fields');
    if (el.style.display === 'none' || el.style.display === '') {
        el.style.display = 'block';
    } else {
        el.style.display = 'none';
    }
}
function generate() {
    let nameInput = document.getElementById('name').value.trim();
    let groupInput = document.getElementById('group').value.trim();
    let modelInput = document.getElementById('model').value.trim();
    let classTypeInput = document.getElementById('classType').value;
    let outputEl = document.getElementById('output');

    if (!nameInput || !groupInput || !modelInput) {
        outputEl.innerText = "Error: Name, Group, and Model are required!";
        return;
    }

    let data = buildData();

    let result = '';
    if (classTypeInput === 'support') {
        result = `RegisterSupportClass( "${nameInput}", "${groupInput}", ${modelInput}, ${data} )`;
    } else {
        result = `RegisterClass( "${nameInput}", "${groupInput}", ${modelInput}, ${data} )`;
    }

    outputEl.innerText = result;
}

function buildData() {
    let lines = [];
    function add(key, value) { lines.push(`\t\t${key} = ${value},`); }

    let teamValue = document.getElementById('team').value.trim();
    let weaponsValue = document.getElementById('weapons').value.trim() || '{}';
    let ammoValue = document.getElementById('ammo').value.trim() || '{}';
    let chipValue = document.getElementById('chip').value.trim() || '';
    let omnitoolValue = document.getElementById('omnitool').checked ? 'true' : 'false';
    let healthValue = document.getElementById('health').value.trim();
    let walkSpeedValue = document.getElementById('walk_speed').value.trim();
    let runSpeedValue = document.getElementById('run_speed').value.trim();
    let sanityValue = document.getElementById('sanity').value.trim();
    let vestValue = document.getElementById('vest').value.trim() || 'nil';
    let maxValue = document.getElementById('max').value.trim();
    let tierValue = document.getElementById('tier').value.trim();

    add("team", teamValue);
    add("weapons", weaponsValue);
    add("ammo", ammoValue);
    add("chip", `"${chipValue}"`);
    add("omnitool", omnitoolValue);
    add("health", healthValue);
    add("walk_speed", walkSpeedValue);
    add("run_speed", runSpeedValue);
    add("sanity", sanityValue);
    add("vest", vestValue);
    add("max", maxValue);
    add("tier", tierValue);

    // Optional section
    if (document.getElementById('optional_master').checked) {
        if (document.getElementById('stamina_toggle').checked) {
            add("stamina", document.getElementById('stamina').value.trim());
        }
        if (document.getElementById('max_sanity_toggle').checked) {
            add("max_sanity", document.getElementById('max_sanity').value.trim());
        }
        if (document.getElementById('hide_toggle').checked) add("hide", "true");
        if (document.getElementById('select_group_toggle').checked) {
            add("select_group", `"${document.getElementById('select_group').value.trim()}"`);
        }
        if (document.getElementById('weight_toggle').checked) {
            add("weight", document.getElementById('weight').value.trim());
        }
        if (document.getElementById('persona_toggle').checked) {
            let personaClass = document.getElementById('persona_class').value.trim();
            let personaTeam = document.getElementById('persona_team').value.trim();
            lines.push(`\t\tpersona = { class = ${personaClass}, team = ${personaTeam} },`);
        }
        if (document.getElementById('override_toggle').checked) {
            lines.push(`\t\toverride = function(ply)\n\t\t\t${document.getElementById('override_body').value}\n\t\tend,`);
        }
        if (document.getElementById('spawn_toggle').checked) {
            let spawnVal = document.getElementById('spawn').value.trim();
            if (spawnVal) add("spawn", spawnVal);
        }
        if (document.getElementById('select_override_toggle').checked) {
            lines.push(`\t\tselect_override = function(cur, total)\n\t\t\t${document.getElementById('select_override_body').value}\n\t\tend,`);
        }
        if (document.getElementById('callback_toggle').checked) {
            lines.push(`\t\tcallback = function(ply, class)\n\t\t\t${document.getElementById('callback_body').value}\n\t\tend,`);
        }
    }

    return "{\n" + lines.join("\n") + "\n\t}";
}
</script>
	</body>
</html>
